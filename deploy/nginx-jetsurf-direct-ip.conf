# Дополнение: заход по http://ВАШ_IP/ (без домена).
# Подключение: ln -sf /etc/nginx/sites-available/jetsurf-direct-ip.conf /etc/nginx/sites-enabled/
# Замените 132.243.16.52 на IP VPS, если другой.
#
# Host передаём как jetsurf-wts.ru — иначе Next.js может отдавать 404 для «чужого» Host.

server {
    listen 80;
    listen [::]:80;
    server_name 132.243.16.52;

    client_max_body_size 2m;

    location = /api/leads {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host jetsurf-wts.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host jetsurf-wts.ru;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
