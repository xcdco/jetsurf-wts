# Скопировать в /etc/nginx/sites-available/jetsurf-wts.ru
# ln -sf /etc/nginx/sites-available/jetsurf-wts.ru /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx
#
# После выпуска сертификата certbot подставит ssl_* и listen 443.

upstream jetsurf_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream jetsurf_api {
    server 127.0.0.1:4000;
    keepalive 8;
}

# default_server — заход по IP попадает сюда, а не в чужой пустой vhost
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name jetsurf-wts.ru www.jetsurf-wts.ru;

    client_max_body_size 2m;

    # Заявки — Express (Telegram-бот и /api/leads)
    location = /api/leads {
        proxy_pass http://jetsurf_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://jetsurf_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
